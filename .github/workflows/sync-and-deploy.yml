name: Sync results and deploy

on:
  schedule:
    - cron: "20 2 * * *"   # nightly, 02:20 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync ANNE data
        if: github.event_name != 'push'
        run: |
          python3 ingest/anne_sync.py
          python3 ingest/build_club_dict.py
          python3 ingest/parse_sportsoftware_html.py
          python3 ingest/parse_sportsoftware_pdf.py
          python3 ingest/parse_sportsoftware_text.py
          python3 ingest/parse_club_table.py
          python3 ingest/parse_liveresultat.py

      # anne_user_eligibility.py needs to query an already-built database to
      # find (person, event) pairs needing a fresh championship-eligibility
      # check (see that script's docstring for why) - build once here so it
      # has one, then the real "Build database" step below rebuilds using
      # whatever it just found.
      - name: Pre-build database for eligibility check
        if: github.event_name != 'push'
        run: python3 build/build_db.py

      # The eligibility cache (data/raw/anne/user_eligibility.json) is
      # deliberately never committed to git - it's per-person data fetched
      # via an authenticated, elevated-access ANNE endpoint (see .gitignore
      # and the commit that introduced this feature). But once a (person,
      # event) pair is decided it must stay decided forever (see
      # anne_user_eligibility.py's docstring on why re-deriving it from
      # today's status would retroactively rewrite past medals) - so it
      # still needs to persist across runs, just not as a public repo file.
      # actions/cache does exactly that: durable across runs, scoped to
      # this repo's workflows, not part of the published site or git
      # history. restore-keys falls back to the most recent prior cache
      # under the same prefix; the unique primary key means a save always
      # happens (there's nothing to "hit" and skip).
      - name: Restore championship eligibility cache
        if: github.event_name != 'push'
        uses: actions/cache/restore@v4
        with:
          path: data/raw/anne/user_eligibility.json
          key: anne-eligibility-${{ github.run_id }}
          restore-keys: anne-eligibility-

      - name: Check championship eligibility
        if: github.event_name != 'push'
        env:
          ANNE_API_KEY: ${{ secrets.ANNE_API_KEY }}
        run: python3 ingest/anne_user_eligibility.py

      - name: Save championship eligibility cache
        if: github.event_name != 'push'
        uses: actions/cache/save@v4
        with:
          path: data/raw/anne/user_eligibility.json
          key: anne-eligibility-${{ github.run_id }}

      - name: Commit new snapshots
        if: github.event_name != 'push'
        run: |
          git config user.name "olresults-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: nightly ANNE sync"
          git push

      - name: Build database
        run: python3 build/build_db.py

      - name: Cache-bust app shell
        # GitHub Pages sets cache-control: max-age=600 on every static file
        # with no way to override it, and mobile Safari in particular can
        # hold onto that well past its stated lifetime. Give style.css and
        # app.js a version query tied to this run, and expose the same
        # version to app.js so every normal page load - not just a manual
        # refresh - fetches the current deploy's database too.
        run: |
          V="${GITHUB_SHA:0:8}-${GITHUB_RUN_NUMBER}"
          sed -i "s/style.css\"/style.css?v=$V\"/; s/app.js\"/app.js?v=$V\"/" site/index.html
          sed -i "s#<script src=\"app.js?v=$V\"></script>#<script>window.OLR_BUILD=\"$V\";</script>\n<script src=\"app.js?v=$V\"></script>#" site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
