name: Sync source data

on:
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      ANNE_BASE_URL: ${{ vars.ANNE_GATEWAY_URL }}/v1
      OLRESULTS_GATEWAY_URL: ${{ vars.ANNE_GATEWAY_URL }}
      ANNE_GATEWAY_TOKEN: ${{ secrets.ANNE_GATEWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore durable eligibility state
        run: python3 ingest/eligibility_state.py pull --required

      - name: Restore private ANNE identity index
        run: python3 ingest/identity_state.py pull --required

      - name: Sync source data through the ANNE gateway
        run: |
          set -o pipefail
          python3 ingest/run_sync.py 2>&1 | tee "$RUNNER_TEMP/source-sync.log"

      - name: Refresh private ANNE identity index when stale
        run: python3 ingest/anne_user_index.py --max-age-hours 168

      - name: Save private ANNE identity index
        run: python3 ingest/identity_state.py push

      - name: Upload source sync log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-sync-${{ github.run_id }}
          path: ${{ runner.temp }}/source-sync.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Pre-build database for eligibility check
        run: python3 build/build_db.py

      - name: Check championship eligibility
        run: python3 ingest/anne_user_eligibility.py

      - name: Build final database with eligibility decisions
        run: python3 build/build_db.py

      - name: Validate final database and update health baseline
        run: |
          python3 build/validate_db.py \
            --write-baseline \
            --report "$RUNNER_TEMP/sync-health.json"

      - name: Save durable eligibility state
        run: python3 ingest/eligibility_state.py push

      - name: Upload sync health report
        uses: actions/upload-artifact@v4
        with:
          name: sync-health-${{ github.run_id }}
          path: ${{ runner.temp }}/sync-health.json
          if-no-files-found: error
          retention-days: 30

      - name: Commit new snapshots
        run: |
          git config user.name "olresults-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: nightly ANNE sync"
          git push

      # Pushes made with GITHUB_TOKEN intentionally do not trigger ordinary
      # push workflows. Dispatch the independent Pages workflow explicitly so
      # it checks out the just-pushed main HEAD and builds from that snapshot.
      - name: Trigger Pages deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref main
